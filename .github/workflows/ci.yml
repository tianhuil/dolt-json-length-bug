name: Dolt JSON_LENGTH Bug Repro

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      dolt:
        image: dolthub/dolt-sql-server:latest
        ports:
          - 3306:3306
        env:
          DOLT_ROOT_HOST: "%"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Wait for Dolt to accept connections
        run: |
          for i in $(seq 1 30); do
            if timeout 1 bash -c "cat < /dev/null > /dev/tcp/127.0.0.1/3306" 2>/dev/null; then
              echo "Dolt is ready"
              exit 0
            fi
            echo "Waiting for Dolt... ($i/30)"
            sleep 2
          done
          echo "Dolt did not become ready in time"
          exit 1

      - run: bun test
        env:
          DOLT_HOST: 127.0.0.1
          DOLT_PORT: 3306
          DOLT_USER: root
          DOLT_PASS: ""
